name: Sync gh-pages with master
# sync gh-pages to the latest version in master while preserving launches.json

on:
  push:
    branches:
      - master

jobs:
  sync-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0   # for merging

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch master
        run: git fetch origin master

      - name: Merge master into gh-pages
        run: |
          git merge origin/master --no-edit --strategy-option theirs|| echo "Merge had conflicts"

      # Preserve launches.json if it exists in gh-pages
      - name: Restore launches.json
        run: |
          git checkout HEAD@{1} -- site/launches.json 2>/dev/null || true

      - name: Commit
        run: |
          git add .
          git add -f site/launches.json || true
          git commit -m "Merge master into gh-pages $(date -u)" || echo "No changes"

      - name: Push
        run: git push origin gh-pages

  deploy:
    needs: sync-branch
    uses: ./.github/workflows/deploy.yml@master
