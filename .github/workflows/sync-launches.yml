name: Sync Launches

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-launch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync data
        run: python sync_launches.py

      - name: Stash data
        run: git stash push data/

      - name: Checkout json
        run: |
          git fetch origin json
          git checkout json

      - name: Apply stached data
        run: |
          git stach pop

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Sync launches [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin json

  deploy:
    needs: sync-launch
    permissions:
      pages: write
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
